Name: interaction.rpc
ListenOn: ${INTERACTION_RPC_LISTEN_ON}

Etcd:
  Hosts:
    - ${ETCD_HOST}:${ETCD_PORT}
  Key: interaction.rpc

UserRpcClientConf:
  Etcd:
    Hosts:
      - ${ETCD_HOST}:${ETCD_PORT}
    Key: user.rpc
  NonBlock: true

ContentRpcClientConf:
  Etcd:
    Hosts:
      - ${ETCD_HOST}:${ETCD_PORT}
    Key: content.rpc
  NonBlock: true

RedisConfig:
  Host: ${REDIS_HOST}:${REDIS_PORT}
  Type: node
  Pass: ""

KqProducerConf:
  Brokers:
    - ${KAFKA_BROKERS}
  Topic: zfeed-like
  MaxRetries: 3

KqConsumerConf:
  Name: interaction-like-consumer
  Brokers:
    - ${KAFKA_BROKERS}
  Group: zfeed-like-consumer
  Topic: zfeed-like
  Offset: last
  Consumers: 8
  Processors: 8

MySQL:
  DataSource: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_HOST}:${MYSQL_APP_PORT})/zfeed?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
