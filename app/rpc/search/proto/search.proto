syntax = "proto3";

package search;

option go_package = "./search";

message SearchUsersReq {
  string query = 1;
  int64 cursor = 2;
  uint32 page_size = 3;
  optional int64 viewer_id = 4;
}

message SearchUserItem {
  int64 user_id = 1;
  string nickname = 2;
  string avatar = 3;
  string bio = 4;
  bool is_following = 5;
}

message SearchUsersRes {
  repeated SearchUserItem items = 1;
  int64 next_cursor = 2;
  bool has_more = 3;
}

message SearchContentsReq {
  string query = 1;
  int64 cursor = 2;
  uint32 page_size = 3;
  optional int64 viewer_id = 4;
}

message SearchContentItem {
  int64 content_id = 1;
  int32 content_type = 2;
  int64 author_id = 3;
  string author_name = 4;
  string author_avatar = 5;
  string title = 6;
  string cover_url = 7;
  int64 published_at = 8;
}

message SearchContentsRes {
  repeated SearchContentItem items = 1;
  int64 next_cursor = 2;
  bool has_more = 3;
}

service SearchService {
  rpc SearchUsers(SearchUsersReq) returns (SearchUsersRes);
  rpc SearchContents(SearchContentsReq) returns (SearchContentsRes);
}
