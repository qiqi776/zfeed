Name: user.rpc
ListenOn: "${USER_RPC_LISTEN_ON}"

Etcd:
  Hosts:
    - "${ETCD_HOST}:${ETCD_PORT}"
  Key: user.rpc

Telemetry:
  Name: user-rpc
  Disabled: ${OTEL_DISABLED}
  Endpoint: "${OTEL_ENDPOINT}"
  Batcher: otlpgrpc
  Sampler: 1.0

Prometheus:
  Host: "${PROM_HOST}"
  Port: ${USER_PROM_PORT}
  Path: /metrics

Log:
  ServiceName: "user-rpc"
  Mode: "file"
  Encoding: "json"
  TimeFormat: "2006-01-02T15:04:05.000Z07:00"
  Path: "${LOG_PATH}/user-rpc"
  Level: "info"
  MaxContentLength: 0
  Compress: false
  Stat: true
  KeepDays: 1
  StackCooldownMillis: 100
  MaxBackups: 0
  MaxSize: 0
  Rotation: "daily"
  FileTimeFormat: "2006-01-02T15:04:05.000Z07:00"

