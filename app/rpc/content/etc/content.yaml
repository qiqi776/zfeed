Name: content.rpc
ListenOn: ${CONTENT_RPC_LISTEN_ON}

Etcd:
  Hosts:
    - ${ETCD_HOST}:${ETCD_PORT}
  Key: content.rpc

InteractionRpcClientConf:
  Etcd:
    Hosts:
      - ${ETCD_HOST}:${ETCD_PORT}
    Key: interaction.rpc
  NonBlock: true

RedisConfig:
  Host: ${REDIS_HOST}:${REDIS_PORT}
  Type: node
  Pass: ""

MySQL:
  DataSource: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_HOST}:${MYSQL_APP_PORT})/zfeed?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
