Name: content.rpc
ListenOn: "${CONTENT_RPC_LISTEN_ON}"

Telemetry:
  Name: content-rpc
  Disabled: ${OTEL_DISABLED}
  Endpoint: "${OTEL_ENDPOINT}"
  Batcher: otlpgrpc
  Sampler: 1.0

Prometheus:
  Host: "${PROM_HOST}"
  Port: ${CONTENT_PROM_PORT}
  Path: /metrics

Log:
  ServiceName: "content-rpc"
  Mode: "file"
  Encoding: "json"
  TimeFormat: "2006-01-02T15:04:05.000Z07:00"
  Path: "${LOG_PATH}/content-rpc"
  Level: "info"
  MaxContentLength: 0
  Compress: false
  Stat: true
  KeepDays: 1
  StackCooldownMillis: 100
  MaxBackups: 0
  MaxSize: 0
  Rotation: "daily"
  FileTimeFormat: "2006-01-02T15:04:05.000Z07:00"

Etcd:
  Hosts:
    - "${ETCD_HOST}:${ETCD_PORT}"
  Key: content.rpc

InteractionRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: interaction.rpc
  NonBlock: true

UserRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: user.rpc
  NonBlock: true

CountRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: count.rpc
  NonBlock: true

Oss:
  Provider: ""
  Region: ""
  BucketName: ""
  AccessKeyId: ""
  AccessKeySecret: ""
  Endpoint: ""
  UploadDir: ""
  PublicHost: ""

RedisConfig:
  Host: "${REDIS_HOST}:${REDIS_PORT}"
  Type: node
  Pass: ""

MySQL:
  DataSource: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_HOST}:${MYSQL_APP_PORT})/zfeed?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

XxlJob:
  AppName: zfeed-content-cron
  Address: "${XXL_EXECUTOR_ADDRESS}"
  RegistryAddress: "${XXL_EXECUTOR_REGISTRY_ADDRESS}"
  IP: "${XXL_EXECUTOR_IP}"
  Port: ${XXL_EXECUTOR_PORT}
  AccessToken: "${XXL_JOB_ACCESS_TOKEN}"
  AdminAddresses:
    - "${XXL_JOB_ADMIN_ADDR}"
  RegistryInterval: 30s
  HTTPTimeout: 10s
