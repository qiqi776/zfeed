
syntax = "proto3";

package content;

option go_package = "./content";

enum ContentType {
  CONTENT_TYPE_UNKNOWN = 0;
  CONTENT_TYPE_ARTICLE = 10;
  CONTENT_TYPE_VIDEO = 20;
}

enum ContentStatus {
  CONTENT_STATUS_UNKNOWN = 0;
  CONTENT_STATUS_DRAFT = 10;
  CONTENT_STATUS_PROCESSING = 20;
  CONTENT_STATUS_PUBLISHED = 30;
  CONTENT_STATUS_FAILED = 40;
}

enum Visibility {
  VISIBILITY_UNKNOWN = 0;
  VISIBILITY_PUBLIC = 10;
  VISIBILITY_PRIVATE = 20;
}

message ArticlePublishReq {
  int64 user_id = 1;
  string title = 2;
  optional string description = 3;
  string cover = 4;
  string content = 5;
  Visibility visibility = 6;
}

message ArticlePublishRes {
  int64 content_id = 1;
}

message VideoPublishReq {
  int64 user_id = 1;
  string title = 2;
  optional string description = 3;
  string origin_url = 4;
  string cover_url = 5;
  int32 duration = 6;
  Visibility visibility = 7;
}

message VideoPublishRes {
  int64 content_id = 1;
}

message BackfillFollowInboxReq {
  int64 follower_id = 1;
  int64 followee_id = 2;
  uint32 limit = 3;
}

message BackfillFollowInboxRes {
  int32 added_count = 1;
}

message RecommendFeedReq {
  optional int64 user_id = 1;
  string cursor = 2;
  uint32 page_size = 3;
  optional string snapshot_id = 4;
}

message RecommendFeedRes {
  repeated ContentItem items = 1;
  int64 next_cursor = 2;
  bool has_more = 3;
  string snapshot_id = 4;
}

message FollowFeedReq {
  int64 user_id = 1;
  string cursor = 2;
  uint32 page_size = 3;
}

message FollowFeedRes {
  repeated FollowFeedItem items = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message UserPublishFeedReq {
  int64 author_id = 1;
  optional int64 viewer_id = 2;
  string cursor = 3;
  uint32 page_size = 4;
}

message UserPublishFeedRes {
  repeated ContentItem items = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message UserFavoriteFeedReq {
  optional int64 viewer_id = 1;
  int64 user_id = 2;
  string cursor = 3;
  uint32 page_size = 4;
}

message UserFavoriteFeedRes {
  repeated ContentItem items = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message ContentItem {
  int64 content_id = 1;
  ContentType content_type = 2;
  int64 author_id = 3;
  string author_name = 4;
  string author_avatar = 5;
  string title = 6;
  string cover_url = 7;
  int64 published_at = 8;
  bool is_liked = 9;
  int64 like_count = 10;
}

message FollowFeedItem {
  int64 content_id = 1;
  ContentType content_type = 2;
  int64 author_id = 3;
  string author_name = 4;
  string author_avatar = 5;
  string title = 6;
  string cover_url = 7;
  int64 published_at = 8;
  bool is_liked = 9;
  int64 like_count = 10;
}

message GetContentDetailReq {
  int64 content_id = 1;
  optional int64 viewer_id = 2;
}

message ContentDetail {
  int64 content_id = 1;
  ContentType content_type = 2;
  int64 author_id = 3;
  string author_name = 4;
  string author_avatar = 5;
  string title = 6;
  string description = 7;
  string cover_url = 8;
  string article_content = 9;
  string video_url = 10;
  int32 video_duration = 11;
  int64 published_at = 12;
  int64 like_count = 13;
  int64 favorite_count = 14;
  int64 comment_count = 15;
  bool is_liked = 16;
  bool is_favorited = 17;
  bool is_following_author = 18;
}

message GetContentDetailRes {
  ContentDetail detail = 1;
}

message OssFormData {
  string host = 1;
  string policy = 2;
  string signature = 3;
  string security_token = 4;
  string signature_version = 5;
  string credential = 6;
  string date = 7;
  string key = 8;
}

message GetUploadCredentialsReq {
  string scene = 1;
  string file_ext = 2;
  int64 file_size = 3;
  string file_name = 4;
}

message GetUploadCredentialsRes {
  string object_key = 1;
  string url = 2;
  OssFormData form_data = 3;
  int64 expired_at = 4;
}

message EditArticleReq {
  int64 user_id = 1;
  int64 content_id = 2;
  optional string title = 3;
  optional string description = 4;
  optional string cover = 5;
  optional string content = 6;
}

message EditArticleRes {
  int64 content_id = 1;
}

message EditVideoReq {
  int64 user_id = 1;
  int64 content_id = 2;
  optional string title = 3;
  optional string description = 4;
  optional string origin_url = 5;
  optional string cover_url = 6;
  optional int32 duration = 7;
}

message EditVideoRes {
  int64 content_id = 1;
}

message DeleteContentReq {
  int64 user_id = 1;
  int64 content_id = 2;
}

message DeleteContentRes {
}

service ContentService {
  rpc PublishArticle(ArticlePublishReq) returns (ArticlePublishRes);
  rpc PublishVideo(VideoPublishReq) returns (VideoPublishRes);
  rpc BackfillFollowInbox(BackfillFollowInboxReq) returns (BackfillFollowInboxRes);
  rpc GetUploadCredentials(GetUploadCredentialsReq) returns (GetUploadCredentialsRes);
  rpc GetContentDetail(GetContentDetailReq) returns (GetContentDetailRes);
  rpc EditArticle(EditArticleReq) returns (EditArticleRes);
  rpc EditVideo(EditVideoReq) returns (EditVideoRes);
  rpc DeleteContent(DeleteContentReq) returns (DeleteContentRes);
}

service FeedService {
  rpc RecommendFeed(RecommendFeedReq) returns (RecommendFeedRes);
  rpc FollowFeed(FollowFeedReq) returns (FollowFeedRes);
  rpc UserPublishFeed(UserPublishFeedReq) returns (UserPublishFeedRes);
  rpc UserFavoriteFeed(UserFavoriteFeedReq) returns (UserFavoriteFeedRes);
}
