Name: zfeed-front-api
Host: "${FRONT_API_HOST}"
Port: ${FRONT_API_PORT}
MaxBytes: 20971520
Timeout: 100000

Telemetry:
  Name: front-api
  Disabled: ${OTEL_DISABLED}
  Endpoint: "${OTEL_ENDPOINT}"
  Batcher: otlpgrpc
  Sampler: 1.0

Log:
  ServiceName: "front-api"
  Mode: "file"
  Encoding: "json"
  TimeFormat: "2006-01-02T15:04:05.000Z07:00"
  Path: "${LOG_PATH}/front-api"
  Level: "info"
  MaxContentLength: 0
  Compress: false
  Stat: true
  KeepDays: 1
  StackCooldownMillis: 100
  MaxBackups: 0
  MaxSize: 0
  Rotation: "daily"
  FileTimeFormat: "2006-01-02T15:04:05.000Z07:00"

Prometheus:
  Host: "${PROM_HOST}"
  Port: ${PROM_PORT}
  Path: /metrics

RedisConfig:
  Host: "${REDIS_HOST}:${REDIS_PORT}"
  Type: node
  Pass: ""

MySQL:
  DataSource: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_HOST}:${MYSQL_APP_PORT})/zfeed?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"

ContentRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: content.rpc
  NonBlock: true

InteractionRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: interaction.rpc
  NonBlock: true

UserRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: user.rpc
  NonBlock: true

CountRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: count.rpc
  NonBlock: true

SearchRpcClientConf:
  Etcd:
    Hosts:
      - "${ETCD_HOST}:${ETCD_PORT}"
    Key: search.rpc
  NonBlock: true

Oss:
  Provider: ""
  Region: ""
  BucketName: ""
  AccessKeyId: ""
  AccessKeySecret: ""
  Endpoint: ""
  UploadDir: ""
  PublicHost: ""

SessionTTL: 86400
CountRPCTimeoutMs: 200
