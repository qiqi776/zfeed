input {
  beats {
    port => 5044
  }
}

filter {
  grok {
    match => {
      "[log][file][path]" => ".*/(?<service_dir>front-api|user-rpc|content-rpc|interaction-rpc|count-rpc)/[^/]+\\.log$"
    }
    tag_on_failure => []
  }

  if ![service_dir] {
    mutate {
      add_field => {
        "service_dir" => "unknown"
      }
    }
  }

  if [layer] == "db" {
    mutate {
      add_field => {
        "event_kind" => "db"
      }
    }
  } else if [caller] =~ "handler/loghandler.go" {
    mutate {
      add_field => {
        "event_kind" => "http"
      }
    }
  } else if [caller] =~ "serverinterceptors/" or [caller] =~ "clientinterceptors/" {
    mutate {
      add_field => {
        "event_kind" => "rpc"
      }
    }
  } else {
    mutate {
      add_field => {
        "event_kind" => "runtime"
      }
    }
  }
}

output {
  file {
    path => "/collected/%{service_dir}-%{+YYYY.MM.dd}.ndjson"
    codec => json_lines
  }
}
