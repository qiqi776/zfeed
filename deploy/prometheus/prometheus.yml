global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "zfeed-front"
    metrics_path: /metrics
    static_configs:
      - targets: ["front-api:9290"]

  - job_name: "zfeed-content"
    metrics_path: /metrics
    static_configs:
      - targets: ["content-rpc:9291"]

  - job_name: "zfeed-count"
    metrics_path: /metrics
    static_configs:
      - targets: ["count-rpc:9292"]

  - job_name: "zfeed-interaction"
    metrics_path: /metrics
    static_configs:
      - targets: ["interaction-rpc:9293"]

  - job_name: "zfeed-user"
    metrics_path: /metrics
    static_configs:
      - targets: ["user-rpc:9294"]

  - job_name: "zfeed-search"
    metrics_path: /metrics
    static_configs:
      - targets: ["search-rpc:9295"]
