services:
  front-api:
    image: ${FRONT_API_IMAGE}
    build:
      context: ..
      dockerfile: build/front-api.Dockerfile
    command: ["/app/bin/front-api", "-f", "/app/app/front/etc/front-api.yaml"]
    working_dir: /app
    environment:
      - ENV_FILE=/app/.env
    env_file:
      - ./.env
    ports:
      - "${FRONT_API_PORT}:5000"
      - "${PROM_PORT}:9290"
    volumes:
      - ./.env:/app/.env:ro
      - ../logs:/var/log/zfeed
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      user-rpc:
        condition: service_started
      content-rpc:
        condition: service_started
      interaction-rpc:
        condition: service_started
      count-rpc:
        condition: service_started
      search-rpc:
        condition: service_started
    networks:
      - zfeed-net

  etcd:
    image: ${ETCD_IMAGE}
    ports:
      - "${ETCD_HOST_PORT}:${ETCD_PORT}"
      - "${ETCD_PEER_HOST_PORT}:${ETCD_PEER_PORT}"
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_NAME=etcd
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:${ETCD_PORT}
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:${ETCD_PORT}
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
      - ETCDCTL_API=3
    volumes:
      - etcd-data:/bitnami/etcd
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "--endpoints=http://127.0.0.1:${ETCD_PORT}",
          "endpoint",
          "health",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - zfeed-net

  redis:
    image: ${REDIS_IMAGE}
    ports:
      - "${REDIS_HOST_PORT}:${REDIS_PORT}"
    volumes:
      - redis-data:/data
    networks:
      - zfeed-net

  mysql:
    image: ${MYSQL_IMAGE}
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/mysql-reseed.sh:/usr/local/bin/mysql-reseed.sh:ro
      - ../script/sql:/seed-sql:ro
      - mysql-data:/var/lib/mysql
    entrypoint: ["/bin/bash", "/usr/local/bin/mysql-reseed.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - zfeed-net

  kafka:
    image: ${KAFKA_IMAGE}
    ports:
      - "${KAFKA_HOST_PORT}:${KAFKA_HOST_PORT}"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=INTERNAL://0.0.0.0:${KAFKA_PORT},EXTERNAL://0.0.0.0:${KAFKA_HOST_PORT},CONTROLLER://0.0.0.0:${KAFKA_CONTROLLER_PORT}
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:${KAFKA_PORT},EXTERNAL://127.0.0.1:${KAFKA_HOST_PORT}
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:${KAFKA_CONTROLLER_PORT}
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_KRAFT_CLUSTER_ID=${KAFKA_CLUSTER_ID}
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - zfeed-net

  canal:
    image: ${CANAL_IMAGE}
    ports:
      - "${CANAL_PORT}:11111"
    command: ["/bin/sh", "-c", "/usr/local/bin/canal-reset-and-start.sh"]
    volumes:
      - ./canal/conf/canal.properties:/home/admin/canal-server/conf/canal.properties
      - ./canal/conf/count:/home/admin/canal-server/conf/count
      - ./canal/reset-and-start.sh:/usr/local/bin/canal-reset-and-start.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - zfeed-net

  xxl-job-admin:
    image: ${XXL_JOB_IMAGE}
    ports:
      - "${XXL_JOB_PORT}:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC
        --spring.datasource.username=${MYSQL_USER}
        --spring.datasource.password=${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - zfeed-net

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "${OTEL_COLLECTOR_GRPC_HOST_PORT}:4317"
      - "${OTEL_COLLECTOR_HTTP_HOST_PORT}:4318"
    volumes:
      - ./otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    depends_on:
      - jaeger
    networks:
      - zfeed-net

  jaeger:
    image: ${JAEGER_IMAGE}
    ports:
      - "${JAEGER_HOST_PORT}:16686"
      - "14268:14268"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - zfeed-net

  user-rpc:
    image: ${USER_RPC_IMAGE}
    build:
      context: ..
      dockerfile: build/user-rpc.Dockerfile
    command: ["/app/bin/user-rpc", "-f", "/app/app/rpc/user/etc/user.yaml"]
    working_dir: /app
    environment:
      - ENV_FILE=/app/.env
    env_file:
      - ./.env
    ports:
      - "5003:5003"
      - "${USER_PROM_PORT}:9294"
    volumes:
      - ./.env:/app/.env:ro
      - ../logs:/var/log/zfeed
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - zfeed-net

  content-rpc:
    image: ${CONTENT_RPC_IMAGE}
    build:
      context: ..
      dockerfile: build/content-rpc.Dockerfile
    command: ["/app/bin/content-rpc", "-f", "/app/app/rpc/content/etc/content.yaml"]
    working_dir: /app
    environment:
      - ENV_FILE=/app/.env
    volumes:
      - ./.env:/app/.env:ro
      - ../logs:/var/log/zfeed
    env_file:
      - ./.env
    ports:
      - "5001:5001"
      - "${XXL_JOB_EXECUTOR_PORT}:${XXL_EXECUTOR_PORT}"
      - "${CONTENT_PROM_PORT}:9291"
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      xxl-job-admin:
        condition: service_started
    networks:
      - zfeed-net

  interaction-rpc:
    image: ${INTERACTION_RPC_IMAGE}
    build:
      context: ..
      dockerfile: build/interaction-rpc.Dockerfile
    command: ["/app/bin/interaction-rpc", "-f", "/app/app/rpc/interaction/etc/interaction.yaml"]
    working_dir: /app
    environment:
      - ENV_FILE=/app/.env
    volumes:
      - ./.env:/app/.env:ro
      - ../logs:/var/log/zfeed
    env_file:
      - ./.env
    ports:
      - "5002:5002"
      - "${INTERACTION_PROM_PORT}:9293"
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - zfeed-net

  count-rpc:
    image: ${COUNT_RPC_IMAGE}
    build:
      context: ..
      dockerfile: build/count-rpc.Dockerfile
    command: ["/app/bin/count-rpc", "-f", "/app/app/rpc/count/etc/count.yaml"]
    working_dir: /app
    environment:
      - ENV_FILE=/app/.env
    volumes:
      - ./.env:/app/.env:ro
      - ../logs:/var/log/zfeed
    env_file:
      - ./.env
    ports:
      - "5004:5004"
      - "${COUNT_PROM_PORT}:9292"
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - zfeed-net

  search-rpc:
    image: ${SEARCH_RPC_IMAGE}
    build:
      context: ..
      dockerfile: build/search-rpc.Dockerfile
    command: ["/app/bin/search-rpc", "-f", "/app/app/rpc/search/etc/search.yaml"]
    working_dir: /app
    environment:
      - ENV_FILE=/app/.env
    volumes:
      - ./.env:/app/.env:ro
      - ../logs:/var/log/zfeed
    env_file:
      - ./.env
    ports:
      - "5006:5006"
      - "${SEARCH_PROM_PORT}:9295"
    depends_on:
      etcd:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - zfeed-net

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zfeed-net

  grafana:
    image: ${GRAFANA_IMAGE}
    ports:
      - "${GRAFANA_HOST_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - zfeed-net

  nginx:
    image: ${NGINX_IMAGE}
    ports:
      - "${GATEWAY_HOST_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - front-api
    networks:
      - zfeed-net

  logstash:
    image: ${LOGSTASH_IMAGE}
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ../logs/collected:/collected
    networks:
      - zfeed-net

  filebeat:
    image: ${FILEBEAT_IMAGE}
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ../logs:/workspace-logs:ro
      - filebeat-data:/usr/share/filebeat/data
    depends_on:
      - logstash
    networks:
      - zfeed-net

networks:
  zfeed-net:
    driver: bridge

volumes:
  etcd-data:
  redis-data:
  mysql-data:
  kafka-data:
  prometheus-data:
  filebeat-data:
