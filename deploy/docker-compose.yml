services:
  etcd:
    image: ${ETCD_IMAGE}
    ports:
      - "${ETCD_HOST_PORT}:${ETCD_PORT}"
      - "${ETCD_PEER_HOST_PORT}:${ETCD_PEER_PORT}"
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_NAME=etcd
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:${ETCD_PORT}
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:${ETCD_PORT}
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
      - ETCDCTL_API=3
    volumes:
      - etcd-data:/bitnami/etcd
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "--endpoints=http://127.0.0.1:${ETCD_PORT}",
          "endpoint",
          "health",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - zfeed-net

  redis:
    image: ${REDIS_IMAGE}
    ports:
      - "${REDIS_HOST_PORT}:${REDIS_PORT}"
    volumes:
      - redis-data:/data
    networks:
      - zfeed-net

  mysql:
    image: ${MYSQL_IMAGE}
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/mysql-reseed.sh:/usr/local/bin/mysql-reseed.sh:ro
      - ../script/sql:/seed-sql:ro
      - mysql-data:/var/lib/mysql
    entrypoint: ["/bin/bash", "/usr/local/bin/mysql-reseed.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - zfeed-net

  kafka:
    image: ${KAFKA_IMAGE}
    ports:
      - "${KAFKA_HOST_PORT}:${KAFKA_HOST_PORT}"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=INTERNAL://0.0.0.0:${KAFKA_PORT},EXTERNAL://0.0.0.0:${KAFKA_HOST_PORT},CONTROLLER://0.0.0.0:${KAFKA_CONTROLLER_PORT}
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:${KAFKA_PORT},EXTERNAL://127.0.0.1:${KAFKA_HOST_PORT}
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:${KAFKA_CONTROLLER_PORT}
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_KRAFT_CLUSTER_ID=${KAFKA_CLUSTER_ID}
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - zfeed-net

  canal:
    image: ${CANAL_IMAGE}
    ports:
      - "${CANAL_PORT}:11111"
    command: ["/bin/sh", "-lc", "/usr/local/bin/canal-reset-and-start.sh"]
    volumes:
      - ./canal/conf/canal.properties:/home/admin/canal-server/conf/canal.properties
      - ./canal/conf/count:/home/admin/canal-server/conf/count
      - ./canal/reset-and-start.sh:/usr/local/bin/canal-reset-and-start.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - zfeed-net

  xxl-job-admin:
    image: ${XXL_JOB_IMAGE}
    ports:
      - "${XXL_JOB_PORT}:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC
        --spring.datasource.username=${MYSQL_USER}
        --spring.datasource.password=${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - zfeed-net

  content-rpc:
    image: golang:1.25
    working_dir: /app
    command:
      - /bin/sh
      - -c
      - ENV_FILE=/app/deploy/.env go run ./app/rpc/content -f app/rpc/content/etc/content.yaml
    volumes:
      - ..:/app
    env_file:
      - ./.env
    ports:
      - "5001:5001"
      - "${XXL_JOB_EXECUTOR_PORT}:${XXL_EXECUTOR_PORT}"
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      xxl-job-admin:
        condition: service_started
    networks:
      - zfeed-net

  interaction-rpc:
    image: golang:1.25
    working_dir: /app
    command:
      - /bin/sh
      - -c
      - ENV_FILE=/app/deploy/.env go run ./app/rpc/interaction -f app/rpc/interaction/etc/interaction.yaml
    volumes:
      - ..:/app
    env_file:
      - ./.env
    ports:
      - "5002:5002"
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - zfeed-net

  count-rpc:
    image: golang:1.25
    working_dir: /app
    command:
      - /bin/sh
      - -c
      - ENV_FILE=/app/deploy/.env go run ./app/rpc/count -f app/rpc/count/etc/count.yaml
    volumes:
      - ..:/app
    env_file:
      - ./.env
    ports:
      - "5004:5004"
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - zfeed-net

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - zfeed-net

  logstash:
    image: ${LOGSTASH_IMAGE}
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ../logs/collected:/collected
    networks:
      - zfeed-net

  filebeat:
    image: ${FILEBEAT_IMAGE}
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ../logs:/workspace-logs:ro
      - filebeat-data:/usr/share/filebeat/data
    depends_on:
      - logstash
    networks:
      - zfeed-net

networks:
  zfeed-net:
    driver: bridge

volumes:
  etcd-data:
  redis-data:
  mysql-data:
  kafka-data:
  prometheus-data:
  filebeat-data:
